<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Postuler - Recrutement GTA RP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Formulaire de candidature</h1>

<a href="index.html"><button>Retour</button></a>

<form id="formCandidature">
<input id="prenomHrp" placeholder="Prénom HRP" required><br>
<input id="ageHrp" placeholder="Age HRP" required><br>
<input id="discordID" placeholder="ID Discord (chiffres)" required><br>
<input id="pseudoDiscord" placeholder="Pseudo Discord" required><br>
<input id="pseudoRp" placeholder="Pseudo RP (vérification)" required><br>
<input id="prenomNom" placeholder="Prénom Nom RP"><br>
<input id="lieuxNaissance" placeholder="Lieu de naissance"><br>
<input id="sexe" placeholder="Sexe"><br>
<input id="tel" placeholder="Téléphone (555-...-...)"><br>
<input id="rib" placeholder="RIB (...-...-...)"><br>
<input id="disponibilite" placeholder="Disponibilité (jour/heure)"><br>
<input id="presentation" placeholder="Présentation"><br>
<input id="diplome" placeholder="Diplôme"><br>
<input id="motivation" placeholder="Motivation"><br>
<input id="permis" placeholder="Permis voiture / moto / poids lourd"><br>
<input id="conclusion" placeholder="Conclusion"><br>
<button type="submit" class="postuler-btn">Envoyer la candidature</button>
</form>

<script src="postuler.js"></script>
</body>
</html>
